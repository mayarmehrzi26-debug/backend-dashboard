services:
  # Backend Spring Boot
  - type: web
    name: sav-balances-api
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: sav-balances-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: sav-balances-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: sav-balances-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: APP_FRONTEND_URL
        value: https://sav-balances-frontend.onrender.com
    healthCheckPath: /api/clients

  # Frontend Angular
  - type: web
    name: sav-balances-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build -- --configuration=production
    staticPublishPath: ./frontend/dist/sav-balances-frontend/browser
    envVars:
      - key: API_URL
        value: https://sav-balances-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Base de données MySQL
  - type: postgresql
    name: sav-balances-db
    plan: free