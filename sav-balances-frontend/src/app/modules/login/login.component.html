<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-shield-lock"></i>
      <h2>SAV Balances</h2>
      <p>Connectez-vous à votre espace de travail</p>
    </div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <div class="input-group">
          <i class="bi bi-person"></i>
          <input type="text" 
                 class="form-control" 
                 [(ngModel)]="username" 
                 name="username"
                 placeholder="Entrez votre nom d'utilisateur"
                 [disabled]="loading"
                 autocomplete="username"
                 required>
        </div>
      </div>
      
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-group">
          <i class="bi bi-lock"></i>
          <input [type]="showPassword ? 'text' : 'password'" 
                 class="form-control" 
                 [(ngModel)]="password" 
                 name="password"
                 placeholder="Entrez votre mot de passe"
                 [disabled]="loading"
                 autocomplete="current-password"
                 required>
          <i class="bi" 
             [class.bi-eye]="!showPassword" 
             [class.bi-eye-slash]="showPassword"
             (click)="togglePassword()"
             style="cursor: pointer; padding-right: 15px;"></i>
        </div>
      </div>
      
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe">
          <span>Se souvenir de moi</span>
        </label>
        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
      </div>
      
      <div *ngIf="errorMessage" class="error-message">
        <i class="bi bi-exclamation-triangle"></i>
        {{ errorMessage }}
      </div>
      
      <button type="submit" class="btn-login" [disabled]="loading">
        <i class="bi" [class.bi-box-arrow-in-right]="!loading" [class.bi-hourglass-split]="loading"></i>
        {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>
    </form>
    
    <div class="login-footer">
      <small>© 2024 SAV Balances - Version 1.0</small>
    </div>
  </div>
</div>
